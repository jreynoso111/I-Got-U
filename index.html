<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buddy Balance</title>
    <meta
      name="description"
      content="Buddy Balance helps friends and loved ones track shared balances with clarity."
    />
    <style>
      :root {
        --ink: #0f172a;
        --slate: #475569;
        --violet: #6366f1;
        --sky: #0ea5e9;
        --glass: rgba(255, 255, 255, 0.7);
        --glass-border: rgba(255, 255, 255, 0.9);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(60rem 60rem at -10% -10%, rgba(99, 102, 241, 0.18), transparent 50%),
          radial-gradient(50rem 50rem at 110% 110%, rgba(14, 165, 233, 0.14), transparent 50%),
          #f8fafc;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(760px, 100%);
        background: var(--glass);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
        padding: 32px 28px;
        backdrop-filter: blur(10px);
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 6vw, 3rem);
        line-height: 1;
        letter-spacing: -0.03em;
      }

      p {
        margin: 0;
        color: var(--slate);
      }

      .subtitle {
        margin-top: 10px;
        font-size: 1.05rem;
      }

      .chips {
        margin-top: 24px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .chip {
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid #e2e8f0;
        background: rgba(255, 255, 255, 0.8);
        font-weight: 600;
        color: #1e293b;
      }

      .cta {
        margin-top: 28px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 14px 18px;
        border-radius: 14px;
        text-decoration: none;
        color: #fff;
        font-weight: 800;
        background: linear-gradient(135deg, var(--violet), var(--sky));
      }

      .foot {
        margin-top: 20px;
        font-size: 0.85rem;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Buddy Balance</h1>
      <p class="subtitle">Hassle-free lending, for your loved ones.</p>

      <div class="chips">
        <span class="chip">Secure & Reliable</span>
        <span class="chip">Real-time Management</span>
      </div>

      <a class="cta" href="#">Get Started</a>
      <p class="foot">© 2026 Buddy Balance, The Anomaly Solutions</p>
    </main>
  </body>
</html>
